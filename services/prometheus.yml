global:
  scrape_interval: 60s
  evaluation_interval: 60s

alerting:
  alertmanagers: []

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ["127.0.0.1:9100"]

  - job_name: postgres
    static_configs:
      - targets: ["127.0.0.1:9187"]

  - job_name: n8n
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:5678"]
    # n8n exposes /metrics when N8N_METRICS=true is set in n8n.env

  - job_name: hermes_gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:8642"]
